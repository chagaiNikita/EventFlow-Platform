version: '3.1'

volumes:
  pg_data:
  kafka_data:

services:
  postgres:
    container_name: postgres
    image: postgres:18
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_ADMIN_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_ADMIN_PASSWORD}
      - POSTGRES_DB=postgres
      - AUTH_DB_NAME=${AUTH_DB_NAME}
      - AUTH_DB_USERNAME=${AUTH_DB_USERNAME}
      - AUTH_DB_PASSWORD=${AUTH_DB_PASSWORD}
      - USER_DB_NAME=${USER_DB_NAME}
      - USER_DB_USERNAME=${USER_DB_USERNAME}
      - USER_DB_PASSWORD=${USER_DB_PASSWORD}
      - PRODUCT_DB_NAME=${PRODUCT_DB_NAME}
      - PRODUCT_DB_USERNAME=${PRODUCT_DB_USERNAME}
      - PRODUCT_DB_PASSWORD=${PRODUCT_DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql
      - ./db-init:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:5433:5432"


  kafka:
    image: apache/kafka:3.7.0
    container_name: loan-kafka
    ports:
      - '9092:9092'
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@loan-kafka:9093

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://loan-kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data

  auth-service:
    container_name: auth_service
    restart: always
    env_file:
      - .env
    build:
      context: .  # Корень монорепозитория
      dockerfile: ./auth-service/Dockerfile  # Путь к Dockerfile
    ports:
      - "8082:8080"
    depends_on:
      - postgres
      - kafka

  user-service:
    container_name: user_service
    restart: always
    env_file:
      - .env
    build:
      context: .  # Корень монорепозитория
      dockerfile: ./user-service/Dockerfile  # Путь к Dockerfile
    ports:
      - "8083:8080"
    depends_on:
      - postgres
      - kafka

